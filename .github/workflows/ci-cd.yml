name: CI / CD (GitHub Actions)

# 触发方式：push 到 main 或手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:   # 允许运维在 UI 手动点 “Run workflow”

# 全局环境变量
env:
  AZURE_WEBAPP_NAME: myapp-prod-2026      # ← 替换成你的 App Service 名称
  RESOURCE_GROUP: rg-myapp
  SLOT_NAME: staging
  PYTHON_VERSION: '3.14'                  # ← 与 Azure 上的运行时保持一致
  PACKAGE_NAME: app.zip

# -------------------------------------------------
jobs:
  # -------------- 1️⃣ Build & Test ----------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ---------- 缓存 pip 包 ----------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest -q --junitxml=reports/junit.xml

      - name: Upload test results (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml

      # ---------- 打包 ----------
      - name: Archive app (zip)
        run: |
          zip -r ${{ env.PACKAGE_NAME }} . \
               -x ".git/*" ".github/*" "tests/*" "reports/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.PACKAGE_NAME }}

  # -------------- 2️⃣ Deploy to Staging ----------
  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 确保 Staging slot 的 runtime 与 Production 一致
      - name: Sync runtime on Staging slot
        run: |
          az webapp config set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --linux-fx-version "PYTHON|${{ env.PYTHON_VERSION }}"

      - name: Deploy zip to Staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.PACKAGE_NAME }}

  # -------------- 3️⃣ Integration test on Staging ----------
  integration-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (again)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Health check (curl)
        run: |
          # 建议把 /health 写在你的 Flask / FastAPI 里
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/health)
          if [ "$STATUS" -ne 200 ]; then
            echo "❌ Health check failed (status $STATUS)"
            exit 1
          fi
          echo "✅ Health check OK"

  # -------------- 4️⃣ Swap Staging → Production ----------
  swap-to-prod:
    needs: [deploy-staging, integration-test]   # 两者成功才会执行
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap slots (staging → production)
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production
