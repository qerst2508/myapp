name: CI / CD (GitHub Actions)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # ---------------- Azure ----------------
  AZURE_WEBAPP_NAME: myapp-prod-2026
  RESOURCE_GROUP: rg-myapp
  SLOT_NAME: staging

  # ---------------- Python ---------------
  PYTHON_VERSION: '3.14'
  PACKAGE_NAME: app.zip

  # ---------------- Node 24 ---------------
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # 把所有 action 強制跑在 Node 24

jobs:
  # ---------------- Build & Test ----------------
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------- 測試（可自行刪除） ----------
      - name: Run pytest
        run: |
          pip install pytest
          pytest -q --junitxml=reports/junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml
      # ---------------------------------------

      - name: Archive app (zip)   # 這裡排除不必要的目錄
        run: |
          zip -r ${{ env.PACKAGE_NAME }} . \
               -x ".git/*" ".github/*" "tests/*" "reports/*" \
               "venv/*" "node_modules/*" "__pycache__/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.PACKAGE_NAME }}

  # ---------------- Deploy to Staging ----------------
  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync runtime (ensure same as production)
        run: |
          az webapp config set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --linux-fx-version "PYTHON|${{ env.PYTHON_VERSION }}"

      - name: Deploy zip to Staging slot
        uses: azure/webapps-deploy@v4
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.PACKAGE_NAME }}

  # ---------------- Integration test ----------------
  integration-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Azure Login (again)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Health‑check (curl)
        run: |
          # 改成你實際的健康端點；這裡使用根路徑作為示例
          URL="https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/"
          echo "Checking $URL …"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Health‑check failed (status $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Health‑check OK (status $HTTP_STATUS)"

  # ---------------- Swap Staging → Production ----------------
  swap-to-prod:
    needs: [deploy-staging, integration-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Wait for any previous slot‑swap operation to finish
        id: wait-swap
        run: |
          RG="${{ env.RESOURCE_GROUP }}"
          APP="${{ env.AZURE_WEBAPP_NAME }}"
          MAX_WAIT_SECONDS=300
          INTERVAL=10
          elapsed=0
          while true; do
            pending=$(az webapp operation list \
                       --resource-group "$RG" \
                       --name "$APP" \
                       --query "[?operationName=='SwapSiteSlots' && status!='Succeeded'].status" \
                       -o tsv)
            if [[ -z "$pending" ]]; then
              echo "✅ No pending SwapSiteSlots operation."
              break
            else
              echo "⏳ Pending swap detected (status: $pending). Waiting $INTERVAL s..."
            fi
            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
            if [[ $elapsed -gt $MAX_WAIT_SECONDS ]]; then
              echo "⚠️ Waited $MAX_WAIT_SECONDS seconds; proceeding anyway."
              break
            fi
          done

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap slots (staging → production) – try 1
        id: swap1
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production
        continue-on-error: true

      - name: Retry swap if first attempt failed
        if: steps.swap1.outcome == 'failure'
        run: |
          echo "🔁 First swap failed – likely because a previous operation was still running."
          echo "   Waiting 20 seconds before retry..."
          sleep 20
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production
