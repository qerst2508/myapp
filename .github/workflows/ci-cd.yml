name: CI / CD (GitHub Actions)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Azure
  AZURE_WEBAPP_NAME: myapp-prod-2026
  RESOURCE_GROUP: rg-myapp
  SLOT_NAME: staging

  # Python
  PYTHON_VERSION: '3.14'
  PACKAGE_NAME: app.zip

  # 強制使用 Node 24（避免 Node 20 被淘汰的警告）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ------------------- Build & Test -------------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Archive app (zip)   # 排除不必要檔案，減小 zip 大小
        run: |
          zip -r ${{ env.PACKAGE_NAME }} . \
               -x ".git/*" ".github/*" "tests/*" "reports/*" \
               "venv/*" "node_modules/*" "__pycache__/*"
      - uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.PACKAGE_NAME }}

  # ------------------- Deploy to Staging -------------------
  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-package
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      # ==== 確保 webapp extension 已安裝 ====
      - name: Ensure webapp extension is installed
        run: |
          az extension add --name webapp || az extension update --name webapp
      - name: Sync runtime on Staging slot
        run: |
          az webapp config set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --linux-fx-version "PYTHON|${{ env.PYTHON_VERSION }}"
      - name: Deploy zip to Staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.PACKAGE_NAME }}

  # ------------------- Integration test -------------------
  integration-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Health‑check (curl)
        run: |
          URL="https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/"
          echo "Checking $URL …"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Health‑check failed (status $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Health‑check OK (status $HTTP_STATUS)"

  # ------------------- Swap Staging → Production -------------------
  swap-to-prod:
    needs: [deploy-staging, integration-test]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ---- 必須先安裝 webapp extension，因為下面會用到 `az webapp deployment operation …` (如果你僅用 retry，可以省略) ----
      - name: Ensure webapp extension is installed
        run: |
          az extension add --name webapp || az extension update --name webapp

      - name: Swap slots (staging → production) with retry
        id: swap-with-retry
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          maxAttempts=5
          attempt=1

          while (( attempt <= maxAttempts )); do
            echo "🔁 Swap attempt $attempt / $maxAttempts"
            set +e
            output=$(az webapp deployment slot swap \
                       --resource-group ${{ env.RESOURCE_GROUP }} \
                       --name ${{ env.AZURE_WEBAPP_NAME }} \
                       --slot ${{ env.SLOT_NAME }} \
                       --target-slot production 2>&1)
            exitCode=$?
            set -e

            if [[ $exitCode -eq 0 ]]; then
              echo "✅ Swap succeeded"
              exit 0
            fi

            echo "❌ Swap failed (exit code $exitCode)"
            echo "$output"

            if echo "$output" | grep -i "another operation is in progress" > /dev/null; then
              echo "⏳ Detected concurrent operation – waiting 30 seconds..."
              sleep 30
            else
              echo "⚠️ Unexpected error – aborting."
              exit $exitCode
            fi

            ((attempt++))
          done

          echo "❌ All $maxAttempts attempts failed."
          exit 1
