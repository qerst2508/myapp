name: CI / CD (GitHub Actions)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # ---- Azure ----
  AZURE_WEBAPP_NAME: myapp-prod-2026
  RESOURCE_GROUP: rg-myapp
  SLOT_NAME: staging

  # ---- Python ----
  PYTHON_VERSION: '3.14'
  PACKAGE_NAME: app.zip

  # ---- Node 24 強制使用 ----
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -------------------------------------------------
  # 1️⃣ Build & Test
  # -------------------------------------------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -------------------------------------------------
      # 如果你沒有測試，可以把下面兩行刪除或改成 echo "skip"
      # -------------------------------------------------
      - name: Run tests (pytest)
        run: |
          pip install pytest
          pytest -q --junitxml=reports/junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml
        # -------------------------------------------------

      - name: Archive app (zip)
        run: |
          zip -r ${{ env.PACKAGE_NAME }} . \
               -x ".git/*" ".github/*" "tests/*" "reports/*"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: ${{ env.PACKAGE_NAME }}

  # -------------------------------------------------
  # 2️⃣ Deploy to Staging slot
  # -------------------------------------------------
  deploy-staging:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Sync runtime on Staging slot
        run: |
          az webapp config set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --linux-fx-version "PYTHON|${{ env.PYTHON_VERSION }}"

      - name: Deploy zip to Staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.SLOT_NAME }}
          package: ${{ env.PACKAGE_NAME }}

  # -------------------------------------------------
  # 3️⃣ Integration test (健康檢查) – 這裡使用根路徑 /
  # -------------------------------------------------
  integration-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (again)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Health‑check (curl)
        # 如你的應用提供 /health、/status、/ping 等，請自行修改 URL
        run: |
          INTEGRATION_URL="https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.SLOT_NAME }}.azurewebsites.net/"
          echo "Checking $INTEGRATION_URL …"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$INTEGRATION_URL")
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Health‑check failed (status $HTTP_STATUS)"
            exit 1
          fi
          echo "✅ Health‑check OK (status $HTTP_STATUS)"

  # -------------------------------------------------
  # 4️⃣ Swap Staging → Production (藍綠發布)
  # -------------------------------------------------
  swap-to-prod:
    needs: [deploy-staging, integration-test]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Swap slots (staging → production)
        run: |
          az webapp deployment slot swap \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --slot ${{ env.SLOT_NAME }} \
            --target-slot production
